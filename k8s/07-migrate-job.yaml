apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: petpipeline
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      initContainers:
      - name: wait-for-clickhouse
        image: busybox:1.36
        command:
        - sh
        - -c
        - until wget -qO- http://clickhouse:8123/ping; do echo "waiting for clickhouse..."; sleep 2; done
      containers:
      - name: migrate
        image: k3d-petpipeline-registry.localhost:5050/petpipeline/migrate:latest
        imagePullPolicy: Always
        env:
        - name: CLICKHOUSE_ADDR
          value: clickhouse:9000
      restartPolicy: OnFailure
  backoffLimit: 5
