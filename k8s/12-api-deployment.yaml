apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: petpipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
      - name: wait-for-clickhouse
        image: busybox:1.36
        command:
        - sh
        - -c
        - until wget -qO- http://clickhouse:8123/ping; do echo "waiting for clickhouse..."; sleep 2; done
      containers:
      - name: api
        image: k3d-petpipeline-registry.localhost:5050/petpipeline/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        env:
        - name: CLICKHOUSE_ADDR
          value: clickhouse:9000
        readinessProbe:
          tcpSocket:
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
