apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-cats
  namespace: petpipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-cats
  template:
    metadata:
      labels:
        app: consumer-cats
    spec:
      initContainers:
      - name: wait-for-nats
        image: busybox:1.36
        command:
        - sh
        - -c
        - until wget -qO- http://nats:8222/healthz; do echo "waiting for nats..."; sleep 2; done
      - name: wait-for-clickhouse
        image: busybox:1.36
        command:
        - sh
        - -c
        - until wget -qO- http://clickhouse:8123/ping; do echo "waiting for clickhouse..."; sleep 2; done
      containers:
      - name: consumer
        image: k3d-petpipeline-registry.localhost:5050/petpipeline/consumer:latest
        imagePullPolicy: Always
        env:
        - name: NATS_URL
          value: nats://nats:4222
        - name: CLICKHOUSE_ADDR
          value: clickhouse:9000
        - name: CONSUMER_STREAM
          value: PETS_CATS
        - name: CONSUMER_TABLE
          value: cats
        - name: CONSUMER_NAME
          value: consumer-cats
