services:
  # ── NATS JetStream ────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: nats-jetstream
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # HTTP monitoring
      - "6222:6222" # cluster routing (useful if you add nodes later)
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf
      - nats-data:/data/nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats-provision:
    image: natsio/nats-box:latest
    container_name: nats-provision
    depends_on:
      nats:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        nats -s nats://nats:4222 stream add PETS_DOGS \
          --subjects "pets.dogs" \
          --storage file \
          --retention workqueue \
          --defaults || true
        nats -s nats://nats:4222 stream add PETS_CATS \
          --subjects "pets.cats" \
          --storage file \
          --retention workqueue \
          --defaults || true
        echo "NATS streams provisioned"

  # ── ClickHouse ────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    ports:
      - "8123:8123" # HTTP interface (queries, health, play UI)
      - "9000:9000" # Native TCP protocol (Go client uses this)
      - "9009:9009" # Inter-server replication (for future clustering)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: app
      CLICKHOUSE_USER: dev
      CLICKHOUSE_PASSWORD: dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Migrations ──────────────────────────────────────────
  migrate:
    build:
      context: .
      args:
        SERVICE: migrate
    container_name: pet-migrate
    environment:
      CLICKHOUSE_ADDR: clickhouse:9000
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  # ── Go services ──────────────────────────────────────────
  ingest:
    build:
      context: .
      args:
        SERVICE: ingest
    container_name: pet-ingest
    ports:
      - "5000:5000"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  consumer:
    build:
      context: .
      args:
        SERVICE: consumer
    container_name: pet-consumer
    environment:
      NATS_URL: nats://nats:4222
      CLICKHOUSE_ADDR: clickhouse:9000
    depends_on:
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        SERVICE: api
    container_name: pet-api
    ports:
      - "5001:5001"
    environment:
      CLICKHOUSE_ADDR: clickhouse:9000
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  nats-data:
  clickhouse-data:
  clickhouse-logs:
