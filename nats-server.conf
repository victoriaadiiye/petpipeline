# NATS Server Configuration — Local Development
# Docs: https://docs.nats.io/running-a-nats-service/configuration

listen: 0.0.0.0:4222

server_name: local-nats

# HTTP monitoring endpoint
http_port: 8222

# ──────────────────────────────────────────────
# JetStream configuration
# ──────────────────────────────────────────────
jetstream {
  store_dir: "/data/nats/jetstream"
  max_mem:   256MB
  max_file:  1GB
}

# ──────────────────────────────────────────────
# Logging (verbose for local dev — dial down in prod)
# ──────────────────────────────────────────────
debug:   false
trace:   false
logtime: true

# ──────────────────────────────────────────────
# Connection limits
# ──────────────────────────────────────────────
max_connections: 256
max_payload:     8MB

# ──────────────────────────────────────────────
# Timeouts
# ──────────────────────────────────────────────
ping_interval:  "20s"
ping_max:       3
write_deadline: "5s"
